<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Scanner Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
    <style>
        .signup-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
        }
        .signup-card {
            width: 100%;
            max-width: 440px;
            padding: 2rem;
        }
        .signup-card .card {
            padding: 2rem;
        }
        .signup-icon-input {
            position: relative;
        }
        .signup-icon-input .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .signup-icon-input .form-control {
            padding-left: 38px;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            opacity: 0.6;
        }
        .toggle-password:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <div class="card">
                <div class="text-center mb-4">
                    <i class="bi bi-hdd-rack fs-1 text-primary"></i>
                    <h4 class="mt-2">Create Admin Account</h4>
                    <p class="text-secondary small">Register a new administrator for Scanner Pro</p>
                </div>

                {% if error %}
                <div class="alert alert-danger py-2 small mb-3">{{ error }}</div>
                {% endif %}

                {% if success %}
                <div class="alert alert-success py-2 small mb-3">
                    <i class="bi bi-check-circle me-1"></i> {{ success }}
                    <br><a href="/login/" class="text-decoration-none">Go to Sign In</a>
                </div>
                {% endif %}

                <form method="post" id="signupForm" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <div class="signup-icon-input">
                            <i class="bi bi-person input-icon"></i>
                            <input type="text" name="username" id="username" class="form-control" required autofocus placeholder="Choose a username" autocomplete="username">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <div class="signup-icon-input">
                            <i class="bi bi-envelope input-icon"></i>
                            <input type="email" name="email" id="email" class="form-control" required placeholder="admin@example.com" autocomplete="email">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="signup-icon-input">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" name="password" id="password" class="form-control" required placeholder="Create a strong password" autocomplete="new-password">
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility()" tabindex="-1">
                                <i class="bi bi-eye" id="toggleIcon"></i>
                            </button>
                        </div>

                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirm Password</label>
                        <div class="signup-icon-input">
                            <i class="bi bi-lock-fill input-icon"></i>
                            <input type="password" name="confirm_password" id="confirmPassword" class="form-control" required placeholder="Confirm your password" autocomplete="new-password">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" id="signupBtn">
                        <i class="bi bi-person-plus me-1"></i> Create Account
                    </button>
                </form>

                <div class="text-center mt-3">
                    <span class="text-secondary small">Already have an account?</span>
                    <a href="/login/" class="text-primary small text-decoration-none">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePasswordVisibility() {
            const pw = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                pw.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('signupBtn');

            if (!username || !email || !password || !confirmPassword) {
                e.preventDefault();
                return;
            }
            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Passwords do not match');
                return;
            }
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Creating account...';
        });
    </script>
</body>
</html>
