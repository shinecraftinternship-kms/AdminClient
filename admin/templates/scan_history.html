{% extends "base.html" %}
{% block title %}Scan History - Scanner Pro{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h4 class="mb-0"><i class="bi bi-activity me-2"></i>Scan History</h4>
    <div class="d-flex gap-2">
        <select class="form-select form-select-sm" id="typeFilter" onchange="loadScans()" style="width:auto;">
            <option value="">All Types</option>
            <option value="scheduled">Scheduled</option>
            <option value="local">Local</option>
            <option value="manual">Manual</option>
        </select>
        <div class="input-group input-group-sm" style="width:220px;">
            <span class="input-group-text bg-transparent border-secondary"><i class="bi bi-search text-secondary"></i></span>
            <input type="text" class="form-control" id="searchInput" placeholder="Search device..." oninput="debounceSearch()">
        </div>
        <button class="btn btn-sm btn-outline-secondary" onclick="loadScans()">
            <i class="bi bi-arrow-clockwise"></i>
        </button>
    </div>
</div>

<div class="text-secondary small mb-3" id="scanCount"></div>

<div id="scanList"></div>

<!-- Scan Detail Modal -->
<div class="modal fade" id="scanDetailModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title"><i class="bi bi-file-earmark-text me-2"></i>Scan Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="scanDetailBody">
                <div class="text-center py-4 text-secondary">
                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>Loading...
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

{% endblock %}

{% block scripts %}
<script src="/static/js/scan_history.js"></script>
{% endblock %}
