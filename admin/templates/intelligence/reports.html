{% extends "base.html" %}
{% block title %}Reports - Scanner Pro{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h4 class="mb-0"><i class="bi bi-file-earmark-bar-graph me-2"></i>Reports</h4>
        <div class="d-flex gap-2">
            <select class="form-select form-select-sm" id="typeFilter" style="width:auto;" onchange="loadReports()">
                <option value="">All Types</option>
            </select>
            <select class="form-select form-select-sm" id="statusFilter" style="width:auto;" onchange="loadReports()">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="completed">Completed</option>
                <option value="failed">Failed</option>
            </select>
            <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#generateModal"><i class="bi bi-plus-circle me-1"></i>Generate Report</button>
            <button class="btn btn-sm btn-outline-info" onclick="loadReports()"><i class="bi bi-arrow-clockwise me-1"></i>Refresh</button>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover table-sm mb-0">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Format</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reportsBody"><tr><td colspan="6" class="text-center text-secondary">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="d-flex justify-content-between align-items-center mt-3">
        <small class="text-secondary" id="reportsCount">0 reports</small>
        <div class="d-flex gap-2 align-items-center">
            <button class="btn btn-sm btn-outline-secondary" id="prevPage" onclick="changePage(-1)" disabled><i class="bi bi-chevron-left"></i></button>
            <span class="small text-secondary" id="pageInfo">Page 1</span>
            <button class="btn btn-sm btn-outline-secondary" id="nextPage" onclick="changePage(1)"><i class="bi bi-chevron-right"></i></button>
        </div>
    </div>
</div>

<div class="modal fade" id="generateModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title"><i class="bi bi-file-earmark-plus me-1"></i>Generate Report</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Report Type</label>
                    <select class="form-select" id="reportType"><option value="">Select type...</option></select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Format</label>
                    <select class="form-select" id="reportFormat">
                        <option value="csv">CSV</option>
                        <option value="excel">Excel</option>
                        <option value="pdf">PDF</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary btn-sm" onclick="generateReport()"><i class="bi bi-gear me-1"></i>Generate</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 0;
const PAGE_SIZE = 25;

async function loadReportTypes() {
    try {
        const resp = await fetch('/api/intelligence/reports/types');
        const types = await resp.json();
        const sel = document.getElementById('reportType');
        const filter = document.getElementById('typeFilter');
        const entries = typeof types === 'object' ? Object.entries(types) : [];
        for (const [k, v] of entries) {
            sel.innerHTML += '<option value="' + escapeHtml(k) + '">' + escapeHtml(v) + '</option>';
            filter.innerHTML += '<option value="' + escapeHtml(k) + '">' + escapeHtml(v) + '</option>';
        }
    } catch (e) {
        showToast('Failed to load report types', 'danger');
    }
}

async function loadReports() {
    try {
        const params = new URLSearchParams({ limit: PAGE_SIZE, offset: currentPage * PAGE_SIZE });
        const type = document.getElementById('typeFilter').value;
        const status = document.getElementById('statusFilter').value;
        if (type) params.set('type', type);
        if (status) params.set('status', status);

        const resp = await fetch('/api/intelligence/reports?' + params.toString());
        const data = await resp.json();
        const results = Array.isArray(data) ? data : (data.results || []);
        const total = data.total || results.length;

        const tbody = document.getElementById('reportsBody');
        if (!results.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-secondary">No reports found</td></tr>';
        } else {
            tbody.innerHTML = results.map(r => {
                const statusBadge = r.status === 'completed' ? 'success' : r.status === 'failed' ? 'danger' : 'warning';
                return '<tr>' +
                    '<td class="small">' + escapeHtml(r.name) + '</td>' +
                    '<td class="small">' + escapeHtml(r.report_type) + '</td>' +
                    '<td><span class="badge bg-' + statusBadge + '">' + escapeHtml(r.status) + '</span></td>' +
                    '<td class="small">' + escapeHtml(r.format || '-') + '</td>' +
                    '<td class="small text-secondary">' + timeAgo(r.created_at || r.generated_at) + '</td>' +
                    '<td>' +
                        (r.file_data ? '<button class="btn btn-sm btn-outline-primary me-1" onclick="downloadReport(\'' + r.id + '\')" title="Download"><i class="bi bi-download"></i></button>' : '') +
                        '<button class="btn btn-sm btn-outline-danger" onclick="deleteReport(\'' + r.id + '\')" title="Delete"><i class="bi bi-trash"></i></button>' +
                    '</td>' +
                    '</tr>';
            }).join('');
        }

        const totalPages = Math.ceil(total / PAGE_SIZE);
        document.getElementById('reportsCount').textContent = total + ' reports';
        document.getElementById('pageInfo').textContent = 'Page ' + (currentPage + 1) + (totalPages > 0 ? ' of ' + totalPages : '');
        document.getElementById('prevPage').disabled = currentPage === 0;
        document.getElementById('nextPage').disabled = currentPage >= totalPages - 1 || totalPages === 0;
    } catch (e) {
        showToast('Failed to load reports', 'danger');
    }
}

async function generateReport() {
    const type = document.getElementById('reportType').value;
    const fmt = document.getElementById('reportFormat').value;
    if (!type) {
        showToast('Please select a report type', 'warning');
        return;
    }
    try {
        await fetch('/api/intelligence/reports/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ report_type: type, format: fmt, filters: {} })
        });
        bootstrap.Modal.getInstance(document.getElementById('generateModal')).hide();
        showToast('Report generation started', 'success');
        setTimeout(loadReports, 1500);
    } catch (e) {
        showToast('Failed to generate report', 'danger');
    }
}

async function downloadReport(id) {
    try {
        const resp = await fetch('/api/intelligence/reports/' + id + '/export');
        const data = await resp.json();
        if (data.file_data) {
            const byteChars = atob(data.file_data);
            const bytes = new Uint8Array(byteChars.length);
            for (let i = 0; i < byteChars.length; i++) bytes[i] = byteChars.charCodeAt(i);
            const mimeMap = { csv: 'text/csv', excel: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', pdf: 'application/pdf' };
            const blob = new Blob([bytes], { type: mimeMap[data.format] || 'application/octet-stream' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = (data.name || 'report') + '.' + (data.format || 'csv');
            a.click();
            URL.revokeObjectURL(a.href);
        } else {
            showToast('No file data available', 'warning');
        }
    } catch (e) {
        showToast('Failed to download report', 'danger');
    }
}

async function deleteReport(id) {
    if (!confirm('Delete this report?')) return;
    try {
        await fetch('/api/intelligence/reports/' + id, { method: 'DELETE' });
        showToast('Report deleted', 'success');
        loadReports();
    } catch (e) {
        showToast('Failed to delete report', 'danger');
    }
}

function changePage(delta) {
    currentPage += delta;
    if (currentPage < 0) currentPage = 0;
    loadReports();
}

loadReportTypes();
loadReports();
</script>
{% endblock %}
