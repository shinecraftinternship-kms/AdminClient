{% extends "base.html" %}
{% block title %}Alert Management{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-bell"></i> Alert Management</h2>
        <div>
            <button class="btn btn-outline-primary btn-sm" onclick="runAlertChecks()"><i class="bi bi-play"></i> Run Checks</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="exportAlerts()"><i class="bi bi-download"></i> Export</button>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col">
            <div class="btn-group btn-group-sm" id="severityFilter">
                <button class="btn btn-outline-secondary active" data-value="">All</button>
                <button class="btn btn-outline-info" data-value="information">Info</button>
                <button class="btn btn-outline-warning" data-value="warning">Warning</button>
                <button class="btn btn-outline-danger" data-value="critical">Critical</button>
                <button class="btn btn-outline-dark" data-value="emergency">Emergency</button>
            </div>
        </div>
        <div class="col">
            <select class="form-select form-select-sm" id="statusFilter">
                <option value="">All Status</option>
                <option value="open">Open</option>
                <option value="acknowledged">Acknowledged</option>
                <option value="resolved">Resolved</option>
                <option value="dismissed">Dismissed</option>
            </select>
        </div>
        <div class="col">
            <input class="form-control form-control-sm" id="searchInput" placeholder="Search alerts...">
        </div>
    </div>

    <div class="card">
        <div class="table-responsive">
            <table class="table table-sm table-hover mb-0" id="alertsTable">
                <thead><tr><th>Severity</th><th>Title</th><th>Module</th><th>Category</th><th>Status</th><th>Assigned</th><th>Age</th><th>Actions</th></tr></thead>
                <tbody id="alertsBody"></tbody>
            </table>
        </div>
    </div>
    <div class="mt-2 d-flex justify-content-between align-items-center">
        <small class="text-muted" id="alertsCount">0 alerts</small>
        <nav><ul class="pagination pagination-sm mb-0" id="pagination"></ul></nav>
    </div>
</div>

<div class="modal fade" id="alertDetailModal" tabindex="-1"><div class="modal-dialog">
    <div class="modal-content"><div class="modal-header"><h5 class="modal-title">Alert Detail</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body" id="alertDetailBody"></div>
        <div class="modal-footer">
            <button class="btn btn-success btn-sm" onclick="actionAlert('acknowledge')">Acknowledge</button>
            <button class="btn btn-primary btn-sm" onclick="actionAlert('resolve')">Resolve</button>
            <button class="btn btn-secondary btn-sm" onclick="actionAlert('dismiss')">Dismiss</button>
        </div>
    </div>
</div></div>
{% endblock %}
{% block scripts %}
<script>
let currentAlertId = null;
let currentPage = 0;
const PAGE_SIZE = 50;

async function loadAlerts() {
    const severity = document.querySelector('#severityFilter .active').dataset.value;
    const status = document.getElementById('statusFilter').value;
    const search = document.getElementById('searchInput').value;
    const params = new URLSearchParams({ limit: PAGE_SIZE, offset: currentPage * PAGE_SIZE });
    if (severity) params.set('severity', severity);
    if (status) params.set('status', status);
    if (search) params.set('search', search);

    const resp = await fetch('/api/intelligence/alerts?' + params.toString());
    const data = await resp.json();
    document.getElementById('alertsCount').textContent = data.total + ' alerts';
    const tbody = document.getElementById('alertsBody');
    tbody.innerHTML = (data.results || []).map(a => `<tr>
        <td><span class="badge bg-${a.severity==='emergency'?'dark':a.severity==='critical'?'danger':a.severity==='warning'?'warning text-dark':'info'}">${a.severity}</span></td>
        <td class="small">${a.title}</td>
        <td class="small">${a.module}</td>
        <td class="small">${a.category}</td>
        <td><span class="badge bg-${a.status==='open'?'danger':a.status==='acknowledged'?'warning text-dark':'secondary'}">${a.status}</span></td>
        <td class="small">${a.assigned_user || '-'}</td>
        <td class="small">${a.age_hours}h</td>
        <td><button class="btn btn-sm btn-outline-info" onclick="showAlert('${a.id}')"><i class="bi bi-eye"></i></button></td>
    </tr>`).join('');
}
async function showAlert(id) {
    currentAlertId = id;
    const resp = await fetch('/api/intelligence/alerts/' + id);
    const a = await resp.json();
    document.getElementById('alertDetailBody').innerHTML = `
        <p><strong>Title:</strong> ${a.title}</p>
        <p><strong>Description:</strong> ${a.description || 'N/A'}</p>
        <p><strong>Severity:</strong> ${a.severity} | <strong>Status:</strong> ${a.status} | <strong>Level:</strong> ${a.escalation_level}</p>
        <p><strong>Module:</strong> ${a.module} | <strong>Category:</strong> ${a.category}</p>
        <p><strong>Assigned:</strong> ${a.assigned_user || 'Unassigned'}</p>
        <p><strong>Generated:</strong> ${a.generated_time}</p>
        <p><strong>Resolved:</strong> ${a.resolved_time || 'N/A'}</p>
        ${a.resolution_notes ? '<p><strong>Notes:</strong> ' + a.resolution_notes + '</p>' : ''}
    `;
    new bootstrap.Modal(document.getElementById('alertDetailModal')).show();
}
async function actionAlert(action) {
    if (!currentAlertId) return;
    await fetch('/api/intelligence/alerts/' + currentAlertId + '/action', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({action}),
    });
    bootstrap.Modal.getInstance(document.getElementById('alertDetailModal')).hide();
    loadAlerts();
}
async function runAlertChecks() {
    await fetch('/api/intelligence/alerts/run-checks', {method:'POST'});
    loadAlerts();
}
function exportAlerts() {
    const severity = document.querySelector('#severityFilter .active').dataset.value;
    const status = document.getElementById('statusFilter').value;
    const params = new URLSearchParams();
    if (severity) params.set('severity', severity);
    if (status) params.set('status', status);
    window.open('/api/intelligence/alerts/export?' + params.toString());
}
document.getElementById('severityFilter').addEventListener('click', e => {
    if (e.target.dataset.value !== undefined) {
        document.querySelectorAll('#severityFilter .btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        loadAlerts();
    }
});
document.getElementById('statusFilter').addEventListener('change', loadAlerts);
document.getElementById('searchInput').addEventListener('input', loadAlerts);
loadAlerts();
</script>
{% endblock %}
