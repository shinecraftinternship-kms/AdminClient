{% extends "base.html" %}
{% block title %}Scheduled Reports{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-clock-history"></i> Scheduled Reports</h2>
    </div>
    <div class="card">
        <div class="table-responsive">
            <table class="table table-sm table-hover mb-0">
                <thead><tr><th>Name</th><th>Report Type</th><th>Interval</th><th>Next Run</th><th>Last Run</th><th>Active</th></tr></thead>
                <tbody id="schedBody"></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function loadScheduled() {
    const resp = await fetch('/api/intelligence/scheduled-reports');
    const data = await resp.json();
    document.getElementById('schedBody').innerHTML = (data || []).map(s => `<tr class="small">
        <td>${s.name}</td>
        <td>${s.report_type}</td>
        <td>${s.interval_minutes} min</td>
        <td>${s.next_run ? new Date(s.next_run).toLocaleString() : '-'}</td>
        <td>${s.last_run ? new Date(s.last_run).toLocaleString() : '-'}</td>
        <td><span class="badge bg-${s.is_active?'success':'secondary'}">${s.is_active?'Active':'Inactive'}</span></td>
    </tr>`).join('');
}
loadScheduled();
</script>
{% endblock %}
